name: Agent task
description: Prepare work for an AI coding agent with visible plan, branch, PR, and status updates.
title: "agent: "
labels:
  - agent-ready
body:
  - type: markdown
    attributes:
      value: |
        Use this when a task is intended to be picked up by an AI coding agent. Keep private data out of the issue.
  - type: textarea
    id: task
    attributes:
      label: Task
      description: What should the agent accomplish?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Product context, relevant files, user reports, prior decisions, or constraints.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and non-goals
      description: Include write-path invariants, compatibility constraints, or things the agent should avoid.
  - type: textarea
    id: verification
    attributes:
      label: Suggested verification
      description: Tests, commands, manual checks, or docs updates expected before handoff.
  - type: input
    id: parent
    attributes:
      label: Parent initiative
      description: Link a quarterly initiative or roadmap parent issue when known.
      placeholder: "#123"
  - type: input
    id: roadmap_id
    attributes:
      label: Roadmap reference
      placeholder: "optional — ROADMAP.md area"
