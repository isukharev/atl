name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # Darwin binaries ship in releases, so macOS must be exercised: it catches
        # path/separator differences in safepath/mirror a Linux-only run would miss.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          # Single source of truth for the Go version: the module's go directive.
          go-version-file: go.mod
          check-latest: true
      - name: Build
        run: make build
      - name: Verify stamped build provenance
        run: |
          ./atl version > "$RUNNER_TEMP/atl-version.json"
          grep -F "\"commit\": \"$(git rev-parse HEAD)\"" "$RUNNER_TEMP/atl-version.json"
          grep -F '"build_state": "clean"' "$RUNNER_TEMP/atl-version.json"
      - name: Vet
        run: go vet ./...
      # -race needs cgo (ThreadSanitizer is a C runtime); the runners ship a C
      # toolchain and CGO defaults on. -covermode=atomic is mandatory with -race —
      # non-atomic coverage counters would themselves be a data race. -count=1
      # defeats the test cache so a stale pass can't masquerade as green; -timeout
      # dumps goroutine stacks instead of hanging the job on a deadlock.
      # -coverpkg=./internal/... attributes coverage across package boundaries, so
      # the CLI/app tests that exercise the adapters count toward them; the summary
      # below reports the true cross-package total, not each package in isolation
      # (cmd/scripts are excluded — they are thin mains/build tooling).
      - name: Test
        run: go test -race -covermode=atomic -coverprofile=cover.out -coverpkg=./internal/... -count=1 -timeout=10m ./...
      - name: Coverage summary
        run: |
          {
            echo "### Coverage — cross-package (${{ matrix.os }})"
            echo '```'
            go tool cover -func=cover.out | tail -1
            echo '```'
            echo "<details><summary>Per-function coverage</summary>"
            echo
            echo '```'
            go tool cover -func=cover.out
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: go.mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: Static CGO-free build
        run: CGO_ENABLED=0 go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: true
      - name: Generated plugin trees are current
        run: make check-plugins
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          # Pinned (not "latest") so a compromised/yanked upstream release cannot
          # silently enter CI. Must be a v2 build compiled with Go >= 1.26 (the
          # module's go directive); bump deliberately when the toolchain moves.
          version: v2.12.2

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: true
      - name: govulncheck
        run: |
          # Pinned (not "@latest") so a yanked/compromised upstream release cannot
          # silently enter CI; bump deliberately.
          go install golang.org/x/vuln/cmd/govulncheck@v1.4.0
          govulncheck ./...
