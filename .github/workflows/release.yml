name: release

# Build, sign, and publish release binaries when a vX.Y.Z tag is pushed.
# Binaries are produced ONLY here — never uploaded by hand — and the manifest the
# CLI self-updates from is signed with a key scoped to the protected release
# environment.
on:
  push:
    tags: ['v*']

# Least privilege: the workflow defaults to read-only. The release job below
# elevates its own permissions (contents: write to publish; id-token +
# attestations to emit signed SLSA build provenance). Keep this default at read.
permissions:
  contents: read

# Serialize releases per ref and never cancel an in-flight one: the release job
# signs a manifest and uploads assets, so a cancelled half-publish is worse than
# waiting for the previous run to finish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate the release on a green test run: a pushed tag must never publish an
  # untested binary. Matrixed over the OSes whose binaries we ship, so a macOS
  # path/separator regression can't slip a broken Darwin build past the gate.
  # Hard dependency of the release job below.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: true
      - run: go test -race -count=1 -timeout=10m ./...

  release:
    needs: [test]
    runs-on: ubuntu-latest
    # Environment protection is a second gate after the protected v* tag: only
    # this credential-bearing job can request release secrets, and it must wait
    # for the configured owner approval before GitHub makes them available.
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      # Empty when the signing secret is not configured; the release fails
      # before building because the signed update chain is already established.
      HAS_SIGNING_KEY: ${{ secrets.ATL_RELEASE_PRIVATE_KEY != '' }}
      # First-release bootstrap is intentionally tag-bound and must be removed
      # after that release. An empty/transient release listing otherwise fails.
      TRUST_BOOTSTRAP_TAG: ${{ vars.ATL_RELEASE_TRUST_BOOTSTRAP_TAG }}
      # Emergency reset for an intentionally broken built-in update chain. It
      # must name exactly one tag and must be removed after that release.
      TRUST_RESET_TAG: ${{ vars.ATL_RELEASE_TRUST_RESET_TAG }}
      # Empty when the cross-repo tap token is not configured; gates the optional
      # Homebrew-tap auto-bump below. (secrets.* can't be used in a job-level `if`,
      # so it is surfaced as an env var and checked at step level.)
      HAS_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Assert plugin manifests are in lockstep with the tag
        # The manifest version is the update trigger for installed plugins
        # (unchanged version = clients never refresh their skills), so a
        # release without the bump would silently strand every install.
        run: |
          tag="${GITHUB_REF_NAME#v}"
          for m in .claude-plugin/plugin.json plugins/atl/.codex-plugin/plugin.json; do
            v="$(jq -r .version "$m")"
            if [ "$v" != "$tag" ]; then
              echo "::error::$m version is $v but the tag is $tag — bump it in the release prep commit (docs/RELEASING.md)"; exit 1
            fi
          done

      - name: Require release signing key
        if: env.HAS_SIGNING_KEY != 'true'
        run: |
          echo "::error::ATL_RELEASE_PRIVATE_KEY is required for releases after the signed trust chain has started"
          exit 1

      - name: Verify signing-key continuity
        env:
          ATL_RELEASE_PRIVATE_KEY: ${{ secrets.ATL_RELEASE_PRIVATE_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          releases="$RUNNER_TEMP/releases.json"
          gh api --paginate --slurp "repos/$GITHUB_REPOSITORY/releases?per_page=100" > "$releases"
          previous_tag="$(go run ./scripts/select-release-predecessor \
            --current "$GITHUB_REF_NAME" \
            --bootstrap-tag "$TRUST_BOOTSTRAP_TAG" < "$releases")"
          trusted_source="$RUNNER_TEMP/trusted-pubkey.go"
          if [ "$previous_tag" != "$GITHUB_REF_NAME" ]; then
            gh api --method GET "repos/$GITHUB_REPOSITORY/contents/internal/selfupdate/pubkey.go" \
              -f ref="$previous_tag" \
              -H "Accept: application/vnd.github.raw+json" > "$trusted_source"
          else
            cp internal/selfupdate/pubkey.go "$trusted_source"
          fi
          if [ -n "$TRUST_RESET_TAG" ] && [ "$TRUST_RESET_TAG" != "$GITHUB_REF_NAME" ]; then
            echo "::error::ATL_RELEASE_TRUST_RESET_TAG must be unset or exactly $GITHUB_REF_NAME; remove a stale reset before releasing"
            exit 1
          fi
          if [ -n "$TRUST_RESET_TAG" ]; then
            set -- --allow-trust-reset
          else
            set --
          fi
          go run ./scripts/check-release-key \
            --trusted-source "$trusted_source" \
            --current-source internal/selfupdate/pubkey.go "$@"

      - name: Pin VERSION to the tag
        run: echo "${GITHUB_REF_NAME#v}" > VERSION

      - name: Assert release checkout is clean
        run: test -z "$(git status --porcelain --untracked-files=normal)"

      - name: Cross-compile release binaries
        run: make dist BUILD_COMMIT="$GITHUB_SHA" BUILD_STATE=clean

      - name: Generate manifest
        run: make manifest

      - name: Generate Homebrew formula
        # Emits dist/atl.rb pinned to this release's binaries + sha256. Published
        # as a release asset so a Homebrew tap can vendor it; no tap is written to
        # from here.
        run: make homebrew

      - name: Sign manifest
        env:
          ATL_RELEASE_PRIVATE_KEY: ${{ secrets.ATL_RELEASE_PRIVATE_KEY }}
        run: |
          set -eu
          go run ./scripts/sign-manifest --manifest dist/manifest.json
          test -s dist/manifest.json.sig

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          # Attest install.sh too so a security-conscious user can verify the
          # script out-of-band (gh attestation verify install.sh --signer-workflow
          # …/release.yml) before running it. A piped `curl | sh` install runs the
          # script before it could verify itself; that path relies on the in-script
          # sha256 check, with SLSA provenance available for out-of-band verification.
          subject-path: |
            dist/atl-linux-amd64
            dist/atl-linux-arm64
            dist/atl-darwin-amd64
            dist/atl-darwin-arm64
            install.sh

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          assets="dist/atl-linux-amd64 dist/atl-linux-amd64.sha256 \
                  dist/atl-linux-arm64 dist/atl-linux-arm64.sha256 \
                  dist/atl-darwin-amd64 dist/atl-darwin-amd64.sha256 \
                  dist/atl-darwin-arm64 dist/atl-darwin-arm64.sha256 \
                  dist/manifest.json dist/manifest.json.sig dist/atl.rb install.sh"
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            $assets

      # Optional: push the freshly generated formula to the Homebrew tap so
      # `brew upgrade atl` works without a manual step. Runs only when a
      # cross-repo token is configured (the default GITHUB_TOKEN cannot write to
      # another repo). Placed AFTER publish, so a tap hiccup never blocks the
      # release itself — the formula is also a release asset and can be copied by
      # hand (see docs/RELEASING.md).
      - name: Bump Homebrew tap
        if: env.HAS_TAP_TOKEN == 'true'
        # The release is already published by the step above; a tap push failure
        # (e.g. an expired token) should surface as a warning, not fail an
        # otherwise-successful release. The formula is also a release asset, so it
        # can always be copied by hand (see docs/RELEASING.md).
        continue-on-error: true
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -eu
          ver="${GITHUB_REF_NAME#v}"
          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/isukharev/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp dist/atl.rb tap/Formula/atl.rb
          cd tap
          git add Formula/atl.rb
          # --cached handles both a modified and a brand-new formula file.
          if git diff --cached --quiet; then
            echo "::notice::Homebrew tap already up to date for ${ver}"
            exit 0
          fi
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "atl ${ver}"
          git push
          echo "::notice::Homebrew tap bumped to atl ${ver}"

      - name: Note tap not auto-bumped
        if: env.HAS_TAP_TOKEN != 'true'
        run: echo "::notice::HOMEBREW_TAP_TOKEN is not set — skipping tap auto-bump. Copy dist/atl.rb into isukharev/homebrew-tap manually (see docs/RELEASING.md)."

  # Release publication above is authoritative and must never depend on a
  # third-party documentation service. This follow-up advances the docs source
  # only after publish succeeds, then requests a best-effort Context7 refresh.
  refresh-context7:
    name: Refresh Context7 stable docs (non-blocking)
    needs: [release]
    runs-on: ubuntu-latest
    continue-on-error: true
    environment: context7
    permissions:
      contents: write
    concurrency:
      group: context7-stable
      cancel-in-progress: false
    env:
      HAS_CONTEXT7_KEY: ${{ secrets.CONTEXT7_API_KEY != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Require Context7 refresh key
        if: env.HAS_CONTEXT7_KEY != 'true'
        run: |
          echo "::error::CONTEXT7_API_KEY is not configured in the context7 environment"
          exit 1

      - name: Advance stable branch without rewriting history
        run: |
          set -eu
          git fetch origin stable:refs/remotes/origin/stable
          target="$(git rev-parse "$GITHUB_REF_NAME^{commit}")"
          if ! git merge-base --is-ancestor origin/stable "$target"; then
            echo "::error::stable is not an ancestor of $GITHUB_REF_NAME; refusing to rewind or fork release documentation"
            exit 1
          fi
          git push origin "$target:refs/heads/stable"

      - name: Refresh Context7 library
        env:
          CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
        run: |
          curl --fail --silent --show-error \
            --request POST https://context7.com/api/v1/refresh \
            --header 'Content-Type: application/json' \
            --header "Authorization: Bearer $CONTEXT7_API_KEY" \
            --data '{"libraryName":"/isukharev/atl"}'
