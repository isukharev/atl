name: release

# Build, sign, and publish release binaries when a vX.Y.Z tag is pushed.
# Binaries are produced ONLY here — never uploaded by hand — and the manifest the
# CLI self-updates from is signed with a key that lives only as a repo secret.
on:
  push:
    tags: ['v*']

# Least privilege: the workflow defaults to read-only. The release job below
# elevates its own permissions (contents: write to publish; id-token +
# attestations to emit signed SLSA build provenance). Keep this default at read.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      # Empty when the signing secret is not configured; gates the signing step.
      HAS_SIGNING_KEY: ${{ secrets.ATL_RELEASE_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.26'
          check-latest: true

      - name: Pin VERSION to the tag
        run: echo "${GITHUB_REF_NAME#v}" > VERSION

      - name: Cross-compile release binaries
        run: make dist

      - name: Generate manifest
        run: make manifest

      - name: Sign manifest
        if: env.HAS_SIGNING_KEY == 'true'
        env:
          ATL_RELEASE_PRIVATE_KEY: ${{ secrets.ATL_RELEASE_PRIVATE_KEY }}
        run: go run ./scripts/sign-manifest --manifest dist/manifest.json

      - name: Warn if unsigned
        if: env.HAS_SIGNING_KEY != 'true'
        run: echo "::warning::ATL_RELEASE_PRIVATE_KEY is not set — publishing an UNSIGNED manifest. Client auto-update will stay disabled until a signed release is published."

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: |
            dist/atl-linux-amd64
            dist/atl-linux-arm64
            dist/atl-darwin-amd64
            dist/atl-darwin-arm64

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          assets="dist/atl-linux-amd64 dist/atl-linux-amd64.sha256 \
                  dist/atl-linux-arm64 dist/atl-linux-arm64.sha256 \
                  dist/atl-darwin-amd64 dist/atl-darwin-amd64.sha256 \
                  dist/atl-darwin-arm64 dist/atl-darwin-arm64.sha256 \
                  dist/manifest.json install.sh"
          if [ -f dist/manifest.json.sig ]; then
            assets="$assets dist/manifest.json.sig"
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            $assets
